<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filosite</title>
    <style>
        /* Aggiunta transizione fluida per il cambio colore */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px; 
            transition: background-color 0.8s ease; 
            background-color: #f0f2f5;
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            display: inline-block; 
            max-width: 400px; 
        }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; margin: 5px; transition: 0.3s; }
        button:hover { background: #0056b3; transform: scale(1.05); }
        #timer { font-size: 2em; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Questo è solo l'inizio 🚀</h1>
        
        <p>Cambia l'umore della pagina:</p>
        <button onclick="cambiaColore()">Cambia Colore</button>

        <hr>

        <p id="citazione">"Clicca il tasto per una perla di saggezza."</p>
        <button onclick="nuovaCitazione()">Nuova Citazione</button>

        <hr>

        <div id="timer">00:00</div>
        <button onclick="startTimer()">Avvia Timer (1m)</button>
        <button onclick="resetTimer()">Reset</button>
    </div>

    <script>
        // Funzione Colore - Ora cambia veramente lo sfondo del body
        function cambiaColore() {
            const colori = ['#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff', '#a0c4ff', '#bdb2ff', '#ffc6ff', '#fffffc'];
            const coloreScelto = colori[Math.floor(Math.random() * colori.length)];
            document.body.style.backgroundColor = coloreScelto;
        }

        // Funzione Citazioni
        function nuovaCitazione() {
            const citazioni = [
                "Lascia che il giovane, nella disperazione, vada a caccia. Se uccide l'elefante, la sua poverta finisce. Se l'elefante uccide lui, la sua poverta finisce.",
                "Solo quando una zanzara ti si posa sui testicoli ti rendi conto che c'è sempre un modo per risolvere i problemi senza usare la violenza.",
                "Chi dà la colpa agli altri, ha un viaggio lunghissimo di fronte a sé. Chi dà la colpa a se stesso, è a metà del viaggio. Chi non dà più colpe a nessuno, è arrivato a destinazione.",
                "La creatività è l'intelligenza che si diverte."
            ];
            document.getElementById('citazione').innerText = citazioni[Math.floor(Math.random() * citazioni.length)];
        }

        // Funzione Timer - Corretta con i backtick ``
        let intervallo;
        let secondi = 0;

        function startTimer() {
            clearInterval(intervallo);
            secondi = 60;
            intervallo = setInterval(() => {
                if(secondi <= 0) {
                    clearInterval(intervallo);
                    alert("Tempo scaduto!");
                } else {
                    secondi--;
                    let m = Math.floor(secondi / 60);
                    let s = secondi % 60;
                    // Corretto: ora usa i backtick per inserire le variabili nella stringa
                    document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(intervallo);
            document.getElementById('timer').innerText = "00:00";
        }
    </script>
</body>
</html>
